# ============================================================
# EduAsset CMS — Docker Compose 编排文件
#
# 服务架构：
#   cms-frontend    ── Nginx 静态文件服务 + 反向代理（端口 8080）
#   upload-server   ── 文件上传代理服务（内部端口 8788）
#   db-server       ── JSON 文件 REST API 持久化服务（内部端口 8789）
#
# Overleaf 备份后端（backup-backend）说明：
#   该后端是一个独立的 Node.js 服务，不在本仓库中。
#   有两种接入方式：
#     A. 在 Mac Mini 上独立运行后端（推荐）：
#        修改 docker/nginx.conf 中 /api/ 的 proxy_pass 为
#        http://host.docker.internal:3001/
#     B. 将后端作为 Docker 服务加入本 compose（取消注释下方 backup-backend 块）
#
# 快速启动（仅前端 + 上传服务）：
#   1. cp .env.example .env  并填写必要配置
#   2. docker compose up -d --build
#   3. 访问 http://localhost:8080/cms/
#
# 完整启动（含 Overleaf 备份后端）：
#   参见 DEPLOY.md 第四节
# ============================================================

services:

  # ── 前端静态文件 + Nginx 代理 ────────────────────────────
  cms-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-frontend
    restart: unless-stopped
    ports:
      # 宿主机端口:容器端口
      # 修改左侧端口号以适配 Mac Mini 的实际监听端口
      - "0.0.0.0:${CMS_PORT:-8080}:80"
    depends_on:
      upload-server:
        condition: service_healthy
      db-server:
        condition: service_healthy
    networks:
      - cms-network
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/cms/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

   # ── 文件上传代理服务 + 后端批处理队列引擎 ─────────────────
  # 接收前端上传的文件，优先转发到 MinIO（持久化存储），失败时降级到 tmpfiles.org（临时存储）
  # 供 MinerU URL 模式解析使用
  # 同时包含后端批处理队列引擎，支持浏览器无关的不间断 PDF 处理
  upload-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: cms-upload-server
    restart: unless-stopped
    # 不对外暴露端口，仅在内部网络中供 Nginx 代理访问
    expose:
      - "8788"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cms-network
    # ── 内存限制：Mac Mini 32G 环境下给 upload-server 分配 4G
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 1024M
    # ── 允许访问宿主机的 MinerU 和 Ollama 服务
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - UPLOAD_PORT=8788
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-eduassets}
      # Presigned URL 有效期（秒），默认 24 小时，支持长时间批处理
      - MINIO_PRESIGNED_EXPIRY=${MINIO_PRESIGNED_EXPIRY:-86400}
      # 局域网/生产部署：设置此变量让浏览器可访问 MinIO 文件
      # 格式：http://<宿主机IP>:<CMS_PORT>/minio
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      # db-server 地址（Docker 网络内通过服务名访问）
      # ⚠️ 必须设置此变量，否则 upload-server 默认使用 localhost:8789 无法连通 db-server 容器
      - DB_BASE_URL=http://db-server:8789
      # 允许访问本地/私网 AI endpoint（Ollama 本地模式必须开启）
      # Docker 容器内访问宿主机 Ollama 地址：http://host.docker.internal:11434
      - ALLOW_LOCAL_AI_ENDPOINT=${ALLOW_LOCAL_AI_ENDPOINT:-true}
      # Node.js 内存限制：与 deploy.resources.limits.memory 匹配
      - NODE_OPTIONS=--max-old-space-size=3072
      # 批处理队列容量限制
      - QUEUE_MAX_ACTIVE=${QUEUE_MAX_ACTIVE:-10}
      - QUEUE_MAX_BATCH=${QUEUE_MAX_BATCH:-10}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── JSON 文件持久化 REST API 服务 ──────────────────
  # 提供 CMS 业务数据的持久化存储，替代浏览器 localStorage
  db-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: cms-db-server
    restart: unless-stopped
    command: ["node", "server/db-server.mjs"]
    expose:
      - "8789"
    networks:
      - cms-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - DB_PORT=8789
      - DB_PATH=/data/db-data.json
      - NODE_OPTIONS=--max-old-space-size=384
      - TZ=Asia/Shanghai
    volumes:
      - cms-db-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MinIO 对象存储服务 ───────────────────────────────────  # 提供持久化文件存储，替代 tmpfiles.org 临时存储
  # ⚠️ 生产环境安全建议：将 ports 注释掉，仅通过内部网络访问
  # 如需外部访问控制台，使用 Nginx 反向代理而非直接暴露端口
  # 控制台访问（开发环境）：http://localhost:9001
  minio:
    image: minio/minio:latest
    container_name: cms-minio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    # 生产/UAT 环境：9000 仅内部访问，通过 Nginx /minio/ 代理对外暴露
    # 如需直接访问 MinIO API，可临时取消注释下方端口映射
    # ports:
    #   - "9000:9000"  # API 端口（通过 Nginx /minio/ 代理访问，无需直接暴露）
    #   - "19001:9001"  # Web 控制台端口
    # UAT/开发环境：开启 9001 控制台端口，方便检查存储状态
    ports:
      - "19001:9001"  # MinIO Web 控制台（UAT 调试用）
    networks:
      - cms-network
    environment:
      # ❗ 生产环境必须在 .env 中设置强密码，切勿使用默认值 minioadmin
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - TZ=Asia/Shanghai
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Overleaf 备份后端（方式B：Docker 内联部署，可选） ────
  #
  # 如果你的备份后端与本项目在同一台 Mac Mini 上，
  # 且希望用 Docker 统一管理，请：
  #   1. 取消注释此 service 块
  #   2. 将 build.context 修改为你的后端代码路径
  #   3. 确保 docker/nginx.conf 中 /api/ 仍指向 backup-backend:3001
  #
  # 如果后端已在 Mac Mini 上独立运行（非 Docker），请：
  #   1. 保持此块注释
  #   2. 修改 docker/nginx.conf 中 /api/ 的 proxy_pass 为：
  #      proxy_pass http://host.docker.internal:3001/;
  #
  # backup-backend:
  #   build:
  #     context: ../backup-backend   # ← 修改为实际后端代码路径
  #     dockerfile: Dockerfile
  #   container_name: cms-backup-backend
  #   restart: unless-stopped
  #   expose:
  #     - "3001"
  #   networks:
  #     - cms-network
  #   environment:
  #     - PORT=3001
  #     - OVERLEAF_BASE_URL=${OVERLEAF_BASE_URL}
  #     - OVERLEAF_ADMIN_EMAIL=${OVERLEAF_ADMIN_EMAIL}
  #     - OVERLEAF_ADMIN_PASSWORD=${OVERLEAF_ADMIN_PASSWORD}
  #     - HOST_BACKUP_PATH=/data/backups
  #     - TZ=Asia/Shanghai
  #   volumes:
  #     # 将宿主机备份目录挂载到容器内
  #     - ${HOST_BACKUP_PATH:-./data/backups}:/data/backups
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3

# ── 内部网络 ──────────────────────────────────────────────
networks:
  cms-network:
    driver: bridge
    name: cms-network

# ── 数据卷 ──────────────────────────────────────────────────
volumes:
  minio-data:
    name: cms-minio-data
  cms-db-data:
    name: cms-db-data
