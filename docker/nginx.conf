# ============================================================
# EduAsset CMS — Nginx 配置
#
# 职责：
#   1. 托管前端静态文件（/cms/ 路径）
#   2. 反向代理上传服务（/__proxy/upload → upload-server:8788）
#   3. 反向代理 Overleaf 备份后端 API（/api → backup-backend 或宿主机）
#   4. 反向代理外部 AI/MinerU 服务（/__proxy/mineru 等）
#   5. SPA 路由支持（所有 /cms/* 请求回退到 index.html）
#
# ⚠️  /api 代理目标配置说明：
#   - 如果 backup-backend 作为 Docker 服务运行（docker-compose.yml 中已取消注释）：
#       proxy_pass http://backup-backend:3001/;
#   - 如果 backup-backend 在 Mac Mini 宿主机上独立运行（非 Docker）：
#       proxy_pass http://host.docker.internal:3001/;
#   - 修改后执行：docker compose restart cms-frontend
#
# ⚠️  外部 HTTPS 代理技术说明（MinerU / Kimi / Moonshot 等）：
#   当 proxy_pass 使用变量（set $upstream ...）时，Nginx 不会自动剥离
#   location 前缀。需要使用正则 location 捕获组来手动构造转发路径。
#   方案：location ~ ^/__proxy/mineru/(.*)$ { proxy_pass $upstream/$1$is_args$args; }
# ============================================================

server {
    listen 80;
    server_name _;

    # DNS 解析器（proxy_pass 代理到外部 HTTPS 域名时需要）
    # 使用 Docker 内置 DNS（127.0.0.11）作为主解析器，确保容器内服务名和外部域名均可解析
    # 8.8.8.8 作为备用，在 Docker DNS 无法解析外部域名时使用
    resolver 127.0.0.11 8.8.8.8 valid=300s;
    resolver_timeout 10s;

    # ── 字符集与基础安全头 ──────────────────────────────────
    charset utf-8;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # ── 上传大小限制（与 upload-server 的 200MB 保持一致） ──
    client_max_body_size 210m;

    # ── Gzip 压缩 ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ============================================================
    # 1. 前端静态文件（SPA）
    #    Vite 构建产物位于 /usr/share/nginx/html/cms
    #    base: '/cms/' 与 vite.config.ts 保持一致
    # ============================================================
    location /cms/ {
        alias /usr/share/nginx/html/cms/;
        index index.html;
        try_files $uri $uri/ /cms/index.html;
    }

    # 静态资源（带 hash 的 JS/CSS）长期缓存
    # ⚠️ 此处必须使用 root 而非 alias：
    #   - root 模式：Nginx 将完整 URI 拼接到 root 路径后
    #     请求 /cms/assets/index.js → /usr/share/nginx/html/cms/assets/index.js ✅
    #   - alias 模式（在正则 location 中）：Nginx 直接使用 alias 值，不拼接 URI
    #     请求 /cms/assets/index.js → /usr/share/nginx/html/cms/ ❌（返回 403/404）
    location ~* ^/cms/.*\.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 根路径重定向到 /cms/
    location = / {
        return 301 /cms/;
    }

    # ============================================================
    # 2. 上传代理服务（/__proxy/upload → upload-server）
    #    前端 vite.config.ts 中 /__proxy/upload 代理到此
    # ============================================================
    location /__proxy/upload/ {
        proxy_pass http://upload-server:8788/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ============================================================
    # 3. JSON 文件持久化服务（/__proxy/db → db-server:8789）
    #    前端对 /__proxy/db/ 的所有请求代理到 db-server
    # ============================================================
    location /__proxy/db/ {
        proxy_pass http://db-server:8789/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ============================================================
    # 4. Overleaf 备份后端 API（/api → backup-backend）
    #
    #    ⚠️  根据你的部署方式选择其中一行 proxy_pass：
    #
    #    方式A：backup-backend 作为 Docker 服务运行（默认）
    #    proxy_pass http://backup-backend:3001/;
    #
    #    方式B：backup-backend 在 Mac Mini 宿主机上独立运行
    #    proxy_pass http://host.docker.internal:3001/;
    #
    #    修改后执行：docker compose restart cms-frontend
    # ============================================================
    location /api/ {
        # 使用变量模式 proxy_pass，避免 host.docker.internal 解析失败时 Nginx 拒绝启动
        # ℹ️  在 Mac/Windows Docker Desktop 上 host.docker.internal 自动可用
        #     在 Linux Docker 上需要 docker-compose.yml 中添加 extra_hosts 或改用服务名
        set $upstream_api http://host.docker.internal:3001;
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Access-Token $http_x_access_token;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # 后端不可用时返回 503，而非 502 Bad Gateway
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    # 备份后端不可用时的友好错误响应
    location @api_unavailable {
        add_header Content-Type application/json;
        return 503 '{"error":"备份后端服务暂不可用，请检查 backup-backend 是否已启动"}';
    }

    # ============================================================
    # 5. 外部 AI/MinerU 反向代理（生产环境）
    #    开发环境由 vite.config.ts 的 proxy 处理
    #    生产环境（Docker）需由 Nginx 承担代理职责
    #
    #    ⚠️ 关键修复说明（2026-04-14）：
    #    原始配置使用 rewrite + $request_uri 导致前缀未剥离。
    #    修复方案：使用正则 location 捕获组 $1 构造转发路径，
    #    配合 set $upstream 变量实现运行时 DNS 解析。
    #    格式：location ~ ^/__proxy/xxx/(.*)$ { proxy_pass $upstream/$1$is_args$args; }
    # ============================================================

    # MinerU CDN（必须在 mineru API 之前，避免前缀匹配冲突）
    location ~ ^/__proxy/mineru-cdn/(.*)$ {
        set $upstream_mineru_cdn https://cdn-mineru.openxlab.org.cn;
        proxy_pass $upstream_mineru_cdn/$1$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host cdn-mineru.openxlab.org.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # MinerU 解析 API
    location ~ ^/__proxy/mineru/(.*)$ {
        set $upstream_mineru https://mineru.net;
        proxy_pass $upstream_mineru/$1$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host mineru.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # MinerU 上传大文件时禁用缓冲
        proxy_request_buffering off;
    }

    # Kimi（api.kimi.ai）
    location ~ ^/__proxy/kimi/(.*)$ {
        set $upstream_kimi https://api.kimi.ai;
        proxy_pass $upstream_kimi/$1$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host api.kimi.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Moonshot（api.moonshot.cn）
    location ~ ^/__proxy/moonshot/(.*)$ {
        set $upstream_moonshot https://api.moonshot.cn;
        proxy_pass $upstream_moonshot/$1$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host api.moonshot.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # tmpfiles.org（临时文件存储）
    location ~ ^/__proxy/tmpfiles/(.*)$ {
        set $upstream_tmpfiles https://tmpfiles.org;
        proxy_pass $upstream_tmpfiles/$1$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host tmpfiles.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_request_buffering off;
    }

    # 本地 MinerU 服务（局域网内自部署 MinerU，对齐开发环境 vite proxy）
    # ⚠️ 注意：生产环境中本地 MinerU 的调用实际通过 upload-server 的
    #    /parse/local-mineru 接口完成（前端 → /__proxy/upload/parse/local-mineru → 本地 MinerU），
    #    此 location 仅用于直接访问本地 MinerU 的场景（如健康检查页面等）。
    #    如需修改本地 MinerU 地址，请通过前端设置页配置 localEndpoint。
    location ~ ^/__proxy/mineru-local/(.*)$ {
        # 使用变量模式，避免 host.docker.internal 解析失败时 Nginx 拒绝启动
        set $upstream_mineru_local http://host.docker.internal:8083;
        proxy_pass $upstream_mineru_local/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    # ============================================================
    # 6. MinIO 对象存储反向代理（/minio/ → minio:9000）
    #
    #    用途：让局域网浏览器可直接通过 Nginx 访问 MinIO 预签名文件 URL，
    #    无需暴露 9000 端口到外部网络。
    #
    #    upload-server 中 MINIO_PUBLIC_ENDPOINT 设置为：
    #      http://<宿主机IP>:<CMS_PORT>/minio
    #    生成的预签名 URL 格式：
    #      http://<宿主机IP>:<CMS_PORT>/minio/eduassets/originals/xxx.pdf?X-Amz-...
    #    经此代理转发到：
    #      http://minio:9000/eduassets/originals/xxx.pdf?X-Amz-...
    # ============================================================
    location /minio/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # 对象存储文件可能较大，禁用请求缓冲和响应缓冲
        proxy_request_buffering off;
        proxy_buffering off;
        # 不缓存对象存储响应（预签名 URL 已含访问控制）
        proxy_cache off;
    }

    # ── Error pages ─────────────────────────────────────────
    error_page 404 /cms/index.html;
    error_page 500 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
